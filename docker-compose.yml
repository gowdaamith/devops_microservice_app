version: "3.9"
services:
  api-gateway:
    build: ./gateway/api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      AUTH_SERVICE: http://auth-service:3001
      PRODUCT_SERVICE: http://product-service:3002
      ORDER_SERVICE: http://order-service:3003
    depends_on: 
      - auth-service
      - product-service
      - order-service
    networks:
      - micro-net
  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "3001:3001"
    environment: 
      MONGO_URI: mongodb://mongo:27017/authdb
    depends_on:
      - mongo
    networks:
      - micro-net
  product-service:
    build: ./services/product-service
    container_name: product-service
    ports: 
      - "3002:3002"
    environment:
      MONGO_URI: mongodb://mongo:27017/productdb
      REDIS_HOST: redis
    depends_on:
      - mongo
      - redis
    networks:
      - micro-net
  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "3003-3003"
    environment: 
      MONGO_URI: mongodb://mongo:27017/orderdb
      PRODUCT_SERVICE_URL: http://product-service:3002
    depends_on:
      - mongo
      - product-service
    networks:
      - micro-net
  mongo:
    image: mongo:4.4
    container_name: mongodb
    volumes: 
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - micro-net
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - micro-net
volumes:
  mongo_data:
networks:
  micro-net:
    driver: bridge

